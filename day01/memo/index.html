<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메모장 앱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 메모장</h1>
            <p class="subtitle">간단하고 빠른 메모 관리</p>
        </header>

        <div class="memo-form-section">
            <h2 id="form-title">새 메모 작성</h2>
            <form id="memo-form">
                <input type="hidden" id="memo-id">
                <div class="form-group">
                    <label for="memo-title">제목</label>
                    <input type="text" id="memo-title" placeholder="메모 제목을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="memo-content">내용</label>
                    <textarea id="memo-content" placeholder="메모 내용을 입력하세요" required></textarea>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary" id="submit-btn">
                        <span id="submit-text">메모 추가</span>
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">
                        취소
                    </button>
                </div>
            </form>
        </div>

        <div class="memos-section">
            <div class="section-header">
                <h2>내 메모</h2>
                <span id="memo-count" class="count-badge">0</span>
            </div>
            <div id="memos-container" class="memos-grid">
                <div class="empty-state">
                    <p>📭 아직 메모가 없습니다</p>
                    <p class="empty-subtitle">위의 폼을 사용해서 첫 메모를 작성해보세요!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
