<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - 로그인</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: linear-gradient(135deg, rgba(20,20,40,0.95), rgba(10,10,30,0.95));
      border-radius: 16px;
      border: 2px solid rgba(0,245,255,0.3);
      box-shadow: 0 8px 32px rgba(0,245,255,0.2);
    }

    .auth-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: #00f5ff;
      text-shadow: 0 0 20px rgba(0,245,255,0.6);
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: #fff;
      font-size: 0.9rem;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(10,10,30,0.6);
      border: 1px solid rgba(0,245,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #00f5ff;
      box-shadow: 0 0 12px rgba(0,245,255,0.4);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00f5ff, #0080ff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,245,255,0.4);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
    }

    .error-message {
      color: #ff4444;
      font-size: 0.9rem;
      margin-top: 10px;
      text-align: center;
    }

    .success-message {
      color: #00ff88;
      font-size: 0.9rem;
      margin-top: 10px;
      text-align: center;
    }

    .toggle-text {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    .toggle-link {
      color: #00f5ff;
      cursor: pointer;
      text-decoration: underline;
      margin-left: 5px;
    }

    .toggle-link:hover {
      color: #00d4ff;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← 홈으로</a>

  <div class="auth-container">
    <h1 class="auth-title">TETRIS</h1>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">이메일</label>
        <input type="email" id="login-email" class="form-input" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">비밀번호</label>
        <input type="password" id="login-password" class="form-input" placeholder="********" />
      </div>
      <button class="btn-primary" onclick="handleLogin()">로그인</button>
      <div class="toggle-text">
        계정이 없으신가요?
        <span class="toggle-link" onclick="toggleForm()">회원가입</span>
      </div>
    </div>

    <div id="signup-form" style="display: none;">
      <div class="form-group">
        <label class="form-label" for="signup-email">이메일</label>
        <input type="email" id="signup-email" class="form-input" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" class="form-input" placeholder="********" />
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password-confirm">비밀번호 확인</label>
        <input type="password" id="signup-password-confirm" class="form-input" placeholder="********" />
      </div>
      <button class="btn-primary" onclick="handleSignup()">회원가입</button>
      <div class="toggle-text">
        이미 계정이 있으신가요?
        <span class="toggle-link" onclick="toggleForm()">로그인</span>
      </div>
    </div>

    <div id="message" class="error-message" style="display: none;"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8001/api';

    function toggleForm() {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const message = document.getElementById('message');

      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
      }

      message.style.display = 'none';
    }

    function showMessage(text, isError = true) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = isError ? 'error-message' : 'success-message';
      message.style.display = 'block';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showMessage('이메일과 비밀번호를 입력해주세요.');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const error = await response.json();
          showMessage(error.detail || '로그인에 실패했습니다.');
          return;
        }

        const data = await response.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('email', data.email);

        showMessage('로그인 성공! 게임 페이지로 이동합니다...', false);
        setTimeout(() => {
          window.location.href = 'game.html';
        }, 1000);
      } catch (error) {
        showMessage('서버 연결에 실패했습니다.');
        console.error(error);
      }
    }

    async function handleSignup() {
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const passwordConfirm = document.getElementById('signup-password-confirm').value;

      if (!email || !password || !passwordConfirm) {
        showMessage('모든 필드를 입력해주세요.');
        return;
      }

      if (password !== passwordConfirm) {
        showMessage('비밀번호가 일치하지 않습니다.');
        return;
      }

      if (password.length < 6) {
        showMessage('비밀번호는 최소 6자 이상이어야 합니다.');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const error = await response.json();
          showMessage(error.detail || '회원가입에 실패했습니다.');
          return;
        }

        const data = await response.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('email', data.email);

        showMessage('회원가입 성공! 게임 페이지로 이동합니다...', false);
        setTimeout(() => {
          window.location.href = 'game.html';
        }, 1000);
      } catch (error) {
        showMessage('서버 연결에 실패했습니다.');
        console.error(error);
      }
    }

    // Enter 키로 제출
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const loginForm = document.getElementById('login-form');
        if (loginForm.style.display !== 'none') {
          handleLogin();
        } else {
          handleSignup();
        }
      }
    });

    // 이미 로그인되어 있으면 게임 페이지로 리다이렉트
    if (localStorage.getItem('token')) {
      window.location.href = 'game.html';
    }
  </script>
</body>
</html>
