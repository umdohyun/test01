<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 - 오늘 할 일</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">
                    <span class="emoji">✨</span>
                    이메일 인증
                    <span class="emoji">🌸</span>
                </h1>
            </div>

            <div id="message" class="success-message show">
                <span class="spinner"></span> 이메일 인증을 처리하고 있습니다...
            </div>
        </div>
    </div>

    <!-- Supabase 클라이언트 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase 설정 -->
    <script src="config.js"></script>
    <!-- 인증 처리 -->
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const message = document.getElementById('message');

        async function handleEmailConfirmation() {
            try {
                // URL에서 파라미터 추출
                const params = new URLSearchParams(window.location.search);
                const token_hash = params.get('token_hash');
                const type = params.get('type');

                console.log('Token hash:', token_hash);
                console.log('Type:', type);

                if (token_hash && type === 'email') {
                    // 토큰 검증
                    const { data, error } = await supabaseClient.auth.verifyOtp({
                        token_hash,
                        type: 'email'
                    });

                    if (error) {
                        console.error('OTP 검증 실패:', error);
                        throw error;
                    }

                    console.log('인증 성공:', data);

                    message.innerHTML = '<span class="material-icons" style="font-size: 32px; color: #4caf50;">check_circle</span><br>✅ 이메일 인증이 완료되었습니다!<br>로그인 페이지로 이동합니다...';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else if (token_hash && type) {
                    // 다른 타입의 토큰 처리
                    message.classList.remove('success-message');
                    message.classList.add('error-message');
                    message.textContent = `❌ 지원하지 않는 인증 타입입니다: ${type}`;

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    // 토큰이 없는 경우 - 이미 인증된 세션 확인
                    const { data: { session } } = await supabaseClient.auth.getSession();

                    if (session) {
                        message.innerHTML = '<span class="material-icons" style="font-size: 32px; color: #4caf50;">check_circle</span><br>✅ 이미 인증되었습니다.<br>Todo 앱으로 이동합니다...';

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        message.classList.remove('success-message');
                        message.classList.add('error-message');
                        message.textContent = '❌ 인증 토큰이 유효하지 않습니다. 회원가입을 다시 진행해주세요.';

                        setTimeout(() => {
                            window.location.href = 'signup.html';
                        }, 3000);
                    }
                }
            } catch (error) {
                console.error('인증 처리 실패:', error);

                message.classList.remove('success-message');
                message.classList.add('error-message');

                let errorText = '인증 처리 중 오류가 발생했습니다.';

                if (error.message.includes('expired')) {
                    errorText = '❌ 인증 링크가 만료되었습니다. 회원가입을 다시 진행해주세요.';
                } else if (error.message.includes('invalid')) {
                    errorText = '❌ 유효하지 않은 인증 링크입니다. 회원가입을 다시 진행해주세요.';
                } else {
                    errorText = `❌ ${error.message}`;
                }

                message.textContent = errorText;

                setTimeout(() => {
                    window.location.href = 'signup.html';
                }, 4000);
            }
        }

        // 페이지 로드 시 자동 실행
        handleEmailConfirmation();
    </script>
</body>
</html>
