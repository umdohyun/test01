<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 중 - 오늘 할 일</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="auth-style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">
                    <span class="emoji">✨</span>
                    로그인 중
                    <span class="emoji">🌸</span>
                </h1>
            </div>

            <div id="message" class="success-message show">
                <span class="spinner"></span> 로그인을 처리하고 있습니다...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const message = document.getElementById('message');

        async function handleOAuthCallback() {
            try {
                // URL 해시에서 세션 정보 추출
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');

                if (accessToken) {
                    // 세션 설정
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });

                    if (error) throw error;

                    message.innerHTML = '<span class="material-icons" style="font-size: 32px; color: #4caf50;">check_circle</span><br>✅ 로그인 성공!<br>Todo 앱으로 이동합니다...';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // 세션 확인
                    const { data: { session }, error } = await supabaseClient.auth.getSession();

                    if (session) {
                        message.innerHTML = '<span class="material-icons" style="font-size: 32px; color: #4caf50;">check_circle</span><br>✅ 로그인 성공!<br>Todo 앱으로 이동합니다...';

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                    } else {
                        throw new Error('로그인 정보를 찾을 수 없습니다.');
                    }
                }
            } catch (error) {
                console.error('OAuth 콜백 처리 실패:', error);

                message.classList.remove('success-message');
                message.classList.add('error-message');
                message.innerHTML = `❌ 로그인 처리 중 오류가 발생했습니다.<br>${error.message}`;

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        }

        handleOAuthCallback();
    </script>
</body>
</html>
