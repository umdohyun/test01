<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Photo Album - 날짜별 사진 앨범</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <h1>📸 Photo Album</h1>
                <div class="user-info">
                    <span id="userName">Loading...</span>
                    <button id="logoutBtn" class="btn-logout">로그아웃</button>
                </div>
            </div>
        </header>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-box">
                <input type="file" id="photoInput" accept="image/*" multiple hidden>
                <button id="uploadBtn" class="btn-primary">
                    <span class="icon">📁</span>
                    사진 업로드
                </button>
                <p class="upload-hint">여러 장의 사진을 선택할 수 있습니다</p>
            </div>
        </div>

        <!-- Albums Grid -->
        <div class="albums-container" id="albumsContainer">
            <!-- 앨범들이 여기에 동적으로 생성됨 -->
            <div class="empty-state">
                <div class="empty-icon">📷</div>
                <h3>아직 앨범이 없습니다</h3>
                <p>사진을 업로드하면 자동으로 날짜별 앨범이 생성됩니다</p>
            </div>
        </div>
    </div>

    <!-- Album Detail Modal -->
    <div id="albumModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalAlbumTitle">앨범 제목</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="photos-grid" id="photosGrid">
                    <!-- 사진들이 여기에 표시됨 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Photo Viewer Modal -->
    <div id="photoViewerModal" class="modal photo-viewer">
        <div class="photo-viewer-content">
            <button class="viewer-close" id="closeViewer">&times;</button>
            <button class="viewer-nav viewer-prev" id="prevPhoto">‹</button>
            <img id="viewerImage" src="" alt="Photo">
            <button class="viewer-nav viewer-next" id="nextPhoto">›</button>
            <div class="viewer-info">
                <p id="viewerDate"></p>
                <button id="deletePhotoBtn" class="btn-delete">삭제</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p>업로드 중...</p>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
