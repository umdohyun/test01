<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris - 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a href="index.html" class="back-link">← 홈으로</a>

  <div class="container">
    <div style="text-align: center; margin-bottom: 10px;">
      <span style="color: #00f5ff; font-weight: bold;" id="user-email"></span>
      <button onclick="handleLogout()" style="margin-left: 15px; padding: 6px 12px; background: rgba(255,68,68,0.8); border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 0.9rem;">로그아웃</button>
    </div>
    <h1 class="title">TETRIS</h1>
    <div class="game-wrapper">
      <canvas id="board" width="300" height="600"></canvas>

      <div class="side-panel">
        <div class="panel-section">
          <div class="label">SCORE</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="panel-section">
          <div class="label">LEVEL</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="panel-section">
          <div class="label">LINES</div>
          <div class="value" id="lines">0</div>
        </div>
        <div class="panel-section">
          <div class="label">TOP SCORE</div>
          <div class="value" id="top-score" style="font-size: 1.2rem; color: #ffd700;">-</div>
        </div>
        <div class="panel-section">
          <div class="label">NEXT</div>
          <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="panel-section controls">
          <div class="label">CONTROLS</div>
          <ul>
            <li><span>← →</span> 이동</li>
            <li><span>↑</span> 회전</li>
            <li><span>↓</span> 빠른 낙하</li>
            <li><span>Space</span> 즉시 낙하</li>
            <li><span>P</span> 일시정지</li>
          </ul>
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <div id="overlay-title" class="overlay-title"></div>
        <div id="overlay-score" class="overlay-score"></div>
        <button id="restart-btn" onclick="startGame()">다시 시작</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
